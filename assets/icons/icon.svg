<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <!-- Background -->
  <rect width="100" height="100" rx="18" fill="#0d0d0d"/>

  <!-- Outer ring -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="#cc0000" stroke-width="2" opacity="0.5"/>

  <!-- Middle ring -->
  <circle cx="50" cy="50" r="30" fill="none" stroke="#cc0000" stroke-width="1.5" opacity="0.7"/>

  <!-- Inner ring -->
  <circle cx="50" cy="50" r="16" fill="none" stroke="#cc0000" stroke-width="1.5"/>

  <!-- Crosshair lines -->
  <line x1="50" y1="4"  x2="50" y2="28" stroke="#cc0000" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="50" y1="72" x2="50" y2="96" stroke="#cc0000" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="4"  y1="50" x2="28" y2="50" stroke="#cc0000" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="72" y1="50" x2="96" y2="50" stroke="#cc0000" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Center fill -->
  <circle cx="50" cy="50" r="5" fill="#cc0000"/>

  <!-- Hebrew letters ח"א centered -->
  <text
    x="50" y="54"
    text-anchor="middle"
    dominant-baseline="middle"
    fill="#ffffff"
    font-family="Arial, Tahoma, sans-serif"
    font-weight="900"
    font-size="10"
    letter-spacing="1"
  >ח"א</text>
</svg>
